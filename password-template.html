<!DOCTYPE html>
<html class="staticrypt-html">
<head>
<meta charset="utf-8"/>
<title>/*[|template_title|]*/0</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta http-equiv="cache-control" content="max-age=0"/>
<meta http-equiv="cache-control" content="no-cache"/>
<meta http-equiv="expires" content="0"/>
<meta http-equiv="pragma" content="no-cache"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Instrument Sans',sans-serif;
  background:#0c0e13;
  color:#e8eaf0;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}
.noise{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E")}
.glow{position:fixed;top:-40%;left:-20%;width:70%;height:70%;background:radial-gradient(circle,rgba(74,138,244,.06) 0%,transparent 70%);pointer-events:none}
.glow2{position:fixed;bottom:-30%;right:-20%;width:60%;height:60%;background:radial-gradient(circle,rgba(212,168,83,.04) 0%,transparent 70%);pointer-events:none}
.card{
  position:relative;z-index:1;
  background:linear-gradient(180deg,#12151c,#0c0e13);
  border:1px solid #2e3548;
  border-radius:16px;
  padding:3rem 2.5rem;
  width:100%;
  max-width:420px;
  text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 1px rgba(212,168,83,.1);
}
.card::before{content:'';position:absolute;top:0;left:2rem;right:2rem;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,83,.3),transparent)}
.logo{
  width:48px;height:48px;
  background:linear-gradient(135deg,#d4a853,#e8c06a);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:900;font-size:1.2rem;
  color:#0c0e13;letter-spacing:-1px;
  margin:0 auto 1.5rem;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;font-weight:800;
  letter-spacing:-.5px;
  margin-bottom:.4rem;
}
h1 span{color:#d4a853}
.subtitle{font-size:.78rem;color:#6b7494;margin-bottom:2rem;letter-spacing:.3px}
.staticrypt-instructions{font-size:.78rem;color:#a0a8be;margin-bottom:1.5rem;line-height:1.6}
.input-wrap{
  position:relative;
  background:#181c26;
  border:1px solid #2e3548;
  border-radius:8px;
  margin-bottom:1rem;
  transition:border-color .2s;
}
.input-wrap:focus-within{border-color:#4a8af4}
.staticrypt-password-container{position:relative;width:100%;border:0;margin:0;background:transparent;outline:0}
input[type="password"],input[type="text"]{
  background:transparent;
  border:0;outline:0;
  width:100%;
  padding:14px 44px 14px 16px;
  font-family:'Instrument Sans',sans-serif;
  font-size:.9rem;
  color:#e8eaf0;
}
input::placeholder{color:#6b7494}
.staticrypt-toggle-password-visibility{
  cursor:pointer;height:18px;opacity:.4;
  padding:12px;position:absolute;right:0;top:50%;
  transform:translateY(-50%);width:18px;
  transition:opacity .2s;
}
.staticrypt-toggle-password-visibility:hover{opacity:.7}
.staticrypt-decrypt-button{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,#d4a853,#c9963e);
  border:0;border-radius:8px;
  font-family:'Instrument Sans',sans-serif;
  font-size:.85rem;font-weight:700;
  color:#0c0e13;
  letter-spacing:.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .2s;
}
.staticrypt-decrypt-button:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,168,83,.25)}
.staticrypt-decrypt-button:active{transform:translateY(0)}
.remember-wrap{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:1rem;font-size:.75rem;color:#6b7494;
}
.remember-wrap input[type="checkbox"]{accent-color:#d4a853;width:14px;height:14px;cursor:pointer}
.remember-wrap label{cursor:pointer}
.staticrypt-hr{display:none}
.footer{margin-top:2rem;font-size:.65rem;color:#3a4260;letter-spacing:.5px}
.footer a{color:#4a8af4;text-decoration:none}
.staticrypt-badge{display:none}
</style>
</head>
<body>
<div class="noise"></div>
<div class="glow"></div>
<div class="glow2"></div>

<div class="card">
  <div class="logo">JH</div>
  <h1>Case <span>Intelligence</span></h1>
  <div class="subtitle">Portfolio Analytics Dashboard</div>

  <div class="staticrypt-instructions" id="staticrypt-instructions">/*[|template_instructions|]*/0</div>

  <form id="staticrypt-form" action="#" method="post">
    <div class="input-wrap">
      <div class="staticrypt-password-container">
        <input id="staticrypt-password" type="password" name="password" placeholder="/*[|template_placeholder|]*/0" autocomplete="current-password"/>
        <div class="staticrypt-toggle-password-visibility" id="staticrypt-toggle-password-visibility">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" id="staticrypt-toggle-password-visibility-svg">
            <path d="M256 128c-81.9 0-145.7 48-191.8 128 46.2 80 109.9 128 191.8 128s145.6-48 191.8-128c-46.1-80-109.9-128-191.8-128zm0 219.3c-50.4 0-91.3-40.9-91.3-91.3s40.9-91.3 91.3-91.3 91.3 40.9 91.3 91.3-40.9 91.3-91.3 91.3zm0-147.2c-30.8 0-55.9 25.1-55.9 55.9s25.1 55.9 55.9 55.9 55.9-25.1 55.9-55.9-25-55.9-55.9-55.9z" fill="currentColor"/>
          </svg>
        </div>
      </div>
    </div>
    <p class="staticrypt-decrypt-button-container">
      <button class="staticrypt-decrypt-button" type="submit">/*[|template_button|]*/0</button>
    </p>
    <div class="remember-wrap">
      <input id="staticrypt-remember" type="checkbox" name="remember"/>
      <label for="staticrypt-remember" class="staticrypt-remember-label">/*[|template_remember|]*/0</label>
    </div>
  </form>

  <div class="footer">Secured with AES-256 encryption</div>
</div>

<script>
/*[|crypto_tag|]*/0
/*[|decrypt_tag|]*/0
</script>
</body>
</html>
